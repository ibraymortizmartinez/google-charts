<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="./assets/css/styles.css" rel="stylesheet">
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="py-5">

    <div class="container">
        
        <div class="text-center mb-5">
            <h1 class="titulo-neon mb-3">SISTEMA DE MONITOREO NEURAL</h1>
            <p style="color: #f0f; letter-spacing: 2px;">/// INICIALIZANDO DATOS ALEATORIOS ///</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                
                <div class="card tarjeta-ciberpunk p-4 p-md-5">
                    
                    <div class="text-center mb-5">
                        <div class="contenedor-controles">
                            <label for="sliderDatos" class="mb-0 text-nowrap">
                                VOLUMEN DE DATOS >
                            </label>
                            
                            <input type="range" id="sliderDatos" min="1" max="20" value="10">
                            
                            <span id="valorSlider" class="badge-neon">10</span>
                        </div>
                    </div>

                    <div class="w-100 overflow-hidden">
                        <div id="chart_div"></div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script type="module" src="./assets/js/graficacion.js"></script>

</body>
</html>
