<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Dashboard</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="icon" type="image/png" href="./assets/js/favicon.js">
</head>
<body>

    <nav class="navbar-cyber">
        <div class="nav-titulo">
            <h1 class="titulo-neon">SISTEMA DE MONITOREO NEURAL</h1>
            <p>/// PROTOCOLO SOLAR ACTIVADO ///</p>
        </div>
        <div class="nav-controles">
            <button id="btn-live" class="btn-neon">▶ LIVE FEED</button>
            <button id="btn-extraer" class="btn-neon">⬇ EXTRAER DATOS</button>
        </div>
    </nav>

    <div class="hud-container">
        <div class="hud-panel">
            <span class="hud-label">PROM. MOTIVACIÓN</span>
            <span id="hud-mot" class="hud-valor">--</span>
        </div>
        <div class="hud-panel">
            <span class="hud-label">PROM. ENERGÍA</span>
            <span id="hud-ene" class="hud-valor">--</span>
        </div>
        <div class="hud-panel">
            <span class="hud-label">ESTADO DE RED</span>
            <span id="hud-estado" class="hud-valor">ESPERANDO...</span>
        </div>
    </div>

    <div class="tarjeta-ciberpunk">
        
        <div class="panel-controles">
            <label for="rango-datos">VOLUMEN DE DATOS ></label>
            <input type="range" id="rango-datos" min="3" max="20" value="10">
            <span id="valor-rango" class="badge-neon">10</span>
        </div>

        <div id="chart_div" style="width: 100%; height: 500px;"></div>
    </div>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<script src="assets/js/favicon.js"></script>
<script src="assets/js/datos.js"></script>
<script src="assets/js/opciones.js"></script>

<script src="assets/js/graficacion.js"></script>

<script src="assets/js/main.js"></script>
</body>
</html>
